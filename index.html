<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robik Tap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        :root { --main: #39FF14; --bg: #0b0b0b; }
        body { 
            background: var(--bg); color: var(--main); 
            font-family: 'Arial', sans-serif; text-align: center; 
            margin: 0; user-select: none; overflow: hidden; touch-action: manipulation;
        }
        .container { height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        
        #balance { font-size: 55px; font-weight: 900; margin-top: 40px; color: #fff; text-shadow: 0 0 15px var(--main); }
        .sub-balance { font-size: 18px; color: var(--main); opacity: 0.8; margin-top: -10px; }

        .coin-box { position: relative; flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        #coin { 
            width: 240px; height: 240px; border-radius: 50%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border: 6px solid #222; box-shadow: 0 0 40px rgba(0,0,0,0.8);
            transition: transform 0.05s; display: flex; justify-content: center; align-items: center;
        }
        #coin:active { transform: scale(0.90); border-color: var(--main); }
        
        .tap-anim { position: absolute; color: #fff; font-size: 28px; font-weight: bold; animation: floatUp 0.6s ease-out forwards; pointer-events: none; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        .btn-ads { background: var(--main); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 18px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div>
        <div id="balance">0</div>
        <div class="sub-balance">ROBIX COINS</div>
    </div>

    <div class="coin-box" id="clickArea">
        <div id="coin">
            <img src="cat.png" style="width: 75%; pointer-events: none;" onerror="this.src='https://em-content.zobj.net/source/apple/354/cat-face_1f331.png'">
        </div>
    </div>

    <button class="btn-ads" onclick="showBonusAd()">📺 БОНУС +1,000</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation(); // Чтобы юзер случайно не закрыл

    let score = parseInt(localStorage.getItem('rob_score')) || 0;
    let lastTap = 0;
    let combo = 0;

    const balEl = document.getElementById('balance');
    balEl.innerText = score.toLocaleString();

    // Функция тапа с анти-читом
    function doTap(e) {
        e.preventDefault();
        const now = Date.now();
        
        // Анти-чит: если между тапами меньше 40мс - это кликер
        if (now - lastTap < 40) {
            console.warn("Too fast!");
            return;
        }
        
        score++;
        balEl.innerText = score.toLocaleString();
        
        // Эффекты
        const x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const y = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        createEffect(x, y);
        
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        
        lastTap = now;
        saveData();
    }

    function createEffect(x, y) {
        const div = document.createElement('div');
        div.className = 'tap-anim';
        div.innerText = '+1';
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 600);
    }

    function saveData() {
        localStorage.setItem('rob_score', score);
        // Отправляем данные в Telegram CloudStorage (бесплатно)
        if (tg.CloudStorage) {
            tg.CloudStorage.setItem('total_score', score.toString());
        }
    }

    const area = document.getElementById('clickArea');
    area.addEventListener('touchstart', doTap);
    area.addEventListener('mousedown', doTap);

    // ADSGRAM СЕКЦИЯ
    const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "25058" }) : null;

    function showBonusAd() {
        if (!AdController) {
            alert("Реклама загружается или заблокирована");
            return;
        }
        AdController.show().then(() => {
            score += 1000;
            balEl.innerText = score.toLocaleString();
            saveData();
            tg.showAlert("Вы получили 1,000 робиксов!");
        }).catch(() => {
            tg.showConfirm("Реклама не была досмотрена. Попробуйте еще раз?");
        });
    }

    // Синхронизация при открытии
    tg.CloudStorage.getItem('total_score', (err, value) => {
        if (!err && value) {
            score = parseInt(value);
            balEl.innerText = score.toLocaleString();
        }
    });

</script>
</body>
</html>
