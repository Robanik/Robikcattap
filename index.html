<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robik Cat Tap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        body {
            background: #0a0a0a;
            color: #39FF14;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #app {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .balance { font-size: 50px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #39FF14; }
        
        .click-zone {
            width: 250px;
            height: 250px;
            margin: 0 auto;
            background: radial-gradient(circle, #222 0%, #000 70%);
            border: 4px solid #333;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .click-zone:active { transform: scale(0.95); border-color: #39FF14; }
        .cat-img { width: 80%; height: 80%; object-fit: contain; pointer-events: none; }

        .btn-ad {
            margin-top: 30px;
            background: #111;
            border: 2px solid #39FF14;
            color: #39FF14;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="balance">{{ Math.floor(robiki).toLocaleString() }}</div>
    
    <div class="click-zone" @touchstart.prevent="tap">
        <img src="cat.png" class="cat-img" onerror="this.style.display='none'">
    </div>

    <button class="btn-ad" @click="showAd">📺 БОНУС +1000</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // Твой проверенный ID
    const AdController = window.Adsgram.init({ blockId: "25055" });

    Vue.createApp({
        data() {
            return {
                robiki: 0,
                clickPower: 1
            }
        },
        mounted() {
            // Загрузка данных
            tg.CloudStorage.getItem('rob_save', (err, val) => {
                if (val) this.robiki = parseFloat(val) || 0;
            });
            // Автосохранение раз в 10 сек
            setInterval(this.save, 10000);
        },
        methods: {
            tap() {
                this.robiki += this.clickPower;
                tg.HapticFeedback.impactOccurred('medium');
            },
            save() {
                tg.CloudStorage.setItem('rob_save', this.robiki.toString());
            },
            async showAd() {
                try {
                    const res = await AdController.show();
                    if (res.done) {
                        this.robiki += 1000;
                        this.save();
                        tg.showAlert("💰 Начислено 1000 Робиков!");
                    }
                } catch (e) {
                    tg.showAlert("Реклама пока не готова");
                }
            }
        }
    }).mount('#app');
</script>

</body>
</html>
