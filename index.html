<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robik Cat Tap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        body { background: #000; color: #39FF14; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #balance { font-size: 45px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #39FF14; }
        
        /* Зона тапа */
        #cat-container { width: 260px; height: 260px; background: radial-gradient(circle, #1a1a1a 0%, #000 70%); border: 3px solid #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: transform 0.05s; }
        #cat-container:active { transform: scale(0.95); border-color: #39FF14; }
        #cat-img { width: 80%; height: 80%; object-fit: contain; pointer-events: none; }

        .btn-ad { margin-top: 30px; background: #000; border: 2px solid #39FF14; color: #39FF14; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div id="balance">0</div>
    
    <div id="cat-container">
        <img id="cat-img" src="cat.png" onerror="this.src='https://em-content.zobj.net/source/apple/354/cat-face_1f331.png'">
    </div>

    <button class="btn-ad" onclick="showAd()">📺 БОНУС +1000</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Настройки
    let robiki = 0;
    const AdController = window.Adsgram.init({ blockId: "25055" });

    // Загрузка данных из облака
    tg.CloudStorage.getItem('rob_count', (err, val) => {
        if (val) {
            robiki = parseInt(val) || 0;
            updateUI();
        }
    });

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(robiki).toLocaleString();
    }

    // Логика тапа
    document.getElementById('cat-container').addEventListener('touchstart', function(e) {
        e.preventDefault();
        robiki += 1;
        updateUI();
        tg.HapticFeedback.impactOccurred('medium');
        saveData();
    });

    // Сохранение
    function saveData() {
        tg.CloudStorage.setItem('rob_count', robiki.toString());
    }

    // Реклама
    async function showAd() {
        try {
            const res = await AdController.show();
            if (res.done) {
                robiki += 1000;
                updateUI();
                saveData();
                tg.showAlert("💰 Награда получена!");
            }
        } catch (e) {
            tg.showAlert("Реклама пока не загружена...");
        }
    }
</script>

</body>
</html>
