<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robik Cat Tap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        :root {
            --main-color: #39FF14; /* Неоновый зеленый */
            --bg-color: #0b0b0b;
            --panel-bg: #1a1a1a;
        }

        body { 
            background: var(--bg-color); 
            color: var(--main-color); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            user-select: none; 
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Шапка */
        .header { display: flex; justify-content: space-between; align-items: center; }
        .settings-btn { background: none; border: 1px solid var(--main-color); color: var(--main-color); border-radius: 8px; padding: 5px 10px; cursor: pointer; }

        /* Баланс */
        #balance { font-size: 55px; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(57, 255, 20, 0.6); margin-top: 20px; }
        .currency-name { font-size: 16px; opacity: 0.7; letter-spacing: 2px; }

        /* Коин (Кот) */
        .coin-area { position: relative; flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        #coin { 
            width: 250px; height: 250px; 
            background: radial-gradient(circle, #222 0%, #000 100%); 
            border: 6px solid #333; 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            transition: transform 0.05s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #coin:active { transform: scale(0.93); border-color: var(--main-color); }

        /* Анимация вылетающих цифр */
        .tap-anim {
            position: absolute;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            pointer-events: none;
            animation: moveUp 0.7s ease-out forwards;
        }
        @keyframes moveUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-130px); opacity: 0; }
        }

        /* Кнопки внизу */
        .footer { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .btn-main { background: var(--main-color); color: #000; border: none; border-radius: 12px; padding: 18px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 15px rgba(57, 255, 20, 0.3); }
        .btn-sync { background: #222; color: #ccc; border: 1px solid #444; border-radius: 12px; padding: 10px; font-size: 14px; }

        /* Модалка настроек */
        #modal {
            display: none;
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel-bg); padding: 25px; border-radius: 20px; border: 2px solid var(--main-color);
            z-index: 100; width: 75%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div id="status">Online</div>
            <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
        </div>

        <div>
            <div id="balance">0</div>
            <div class="currency-name">ROBIX COINS</div>
        </div>

        <div class="coin-area" id="clickArea">
            <div id="coin">
                <img src="cat.png" style="width: 75%;" onerror="this.src='https://em-content.zobj.net/source/apple/354/cat-face_1f331.png'">
            </div>
        </div>

        <div class="footer">
            <button class="btn-main" onclick="showBonusAd()">📺 БОНУС +1,000</button>
            <button class="btn-sync" onclick="syncData()">🔄 Синхронизировать с кошельком</button>
        </div>
    </div>

    <div id="modal">
        <h3>Настройки</h3>
        <hr border="1" color="#333">
        <br>
        <label><input type="checkbox" id="soundOn" checked> Звук тапа</label><br><br>
        <label><input type="checkbox" id="vibroOn" checked> Вибрация</label><br><br>
        <button class="btn-main" style="padding: 10px 20px;" onclick="toggleSettings()">ОК</button>
    </div>

    <audio id="tapSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем окно

        // Переменные
        let score = parseInt(localStorage.getItem('rob_score')) || 0;
        let lastTapTime = 0;
        let settings = {
            sound: true,
            vibro: true
        };

        const balEl = document.getElementById('balance');
        const tapSound = document.getElementById('tapSound');

        // Инициализация баланса
        balEl.innerText = score.toLocaleString();

        // --- ЛОГИКА ТАПА ---
        function handleTap(e) {
            e.preventDefault();
            const now = Date.now();
            
            // АНТИ-ЧИТ: не более 20 кликов в секунду (50мс между тапами)
            if (now - lastTapTime < 50) return;

            score++;
            balEl.innerText = score.toLocaleString();
            localStorage.setItem('rob_score', score);

            // Анимация +1 под пальцем
            const x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const y = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            showAnim(x, y);

            // Вибрация и звук
            if (settings.vibro) tg.HapticFeedback.impactOccurred('medium');
            if (settings.sound) {
                tapSound.currentTime = 0;
                tapSound.play();
            }

            lastTapTime = now;
        }

        function showAnim(x, y) {
            const el = document.createElement('div');
            el.className = 'tap-anim';
            el.innerText = '+1';
            el.style.left = `${x - 15}px`;
            el.style.top = `${y - 40}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        const clickArea = document.getElementById('clickArea');
        clickArea.addEventListener('touchstart', handleTap);
        clickArea.addEventListener('mousedown', handleTap);

        // --- РЕКЛАМА ADSGRAM (Твой ID: 25058) ---
        const AdController = window.Adsgram.init({ blockId: "25058" });

        function showBonusAd() {
            AdController.show().then(() => {
                score += 1000;
                balEl.innerText = score.toLocaleString();
                localStorage.setItem('rob_score', score);
                tg.showAlert("🎁 Вы получили 1,000 робиксов!");
            }).catch((result) => {
                tg.showAlert("Нужно досмотреть видео для получения бонуса!");
            });
        }

        // --- СИНХРОНИЗАЦИЯ С БОТОМ ---
        function syncData() {
            // Отправляем текущий счет боту. Бот поймает это через web_app_data
            tg.sendData(score.toString());
        }

        // --- НАСТРОЙКИ ---
        function toggleSettings() {
            const modal = document.getElementById('modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        document.getElementById('soundOn').addEventListener('change', (e) => settings.sound = e.target.checked);
        document.getElementById('vibroOn').addEventListener('change', (e) => settings.vibro = e.target.checked);

        // Сообщаем боту, что мы готовы
        tg.ready();
    </script>
</body>
</html>
