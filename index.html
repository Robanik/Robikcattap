<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robik Cat Tap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        body { background: #000; color: #39FF14; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #balance { font-size: 60px; font-weight: 900; margin-bottom: 10px; }
        #usd { color: #888; margin-bottom: 30px; font-size: 18px; }
        
        #cat-btn {
            width: 280px; height: 280px;
            background: radial-gradient(circle, #111 0%, #000 70%);
            border: 5px solid #222;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: transform 0.1s, border-color 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        #cat-btn:active { transform: scale(0.92); border-color: #39FF14; }
        #cat-img { width: 80%; height: 80%; object-fit: contain; pointer-events: none; }

        .btn-ad {
            margin-top: 40px; background: #39FF14; color: #000; border: none;
            padding: 18px 35px; border-radius: 15px; font-weight: bold;
            font-size: 18px; cursor: pointer; box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }
    </style>
</head>
<body>

    <div id="balance">0</div>
    <div id="usd">≈ $0.00</div>
    
    <div id="cat-btn">
        <img id="cat-img" src="cat.png" onerror="this.src='https://em-content.zobj.net/source/apple/354/cat-face_1f331.png'">
    </div>

    <button class="btn-ad" onclick="runAd()">📺 БОНУС +1000</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let robiki = 0;
    const blockId = "25055"; // Твой ID
    const AdController = window.Adsgram.init({ blockId: blockId });

    // Загрузка
    tg.CloudStorage.getItem('rob_data', (err, val) => {
        if (val) {
            robiki = parseInt(val) || 0;
            render();
        }
    });

    function render() {
        document.getElementById('balance').innerText = Math.floor(robiki).toLocaleString();
        document.getElementById('usd').innerText = "≈ $" + (robiki / 100000 * 0.05).toFixed(4);
    }

    // Универсальный обработчик тапа
    function doTap() {
        robiki += 1;
        render();
        tg.HapticFeedback.impactOccurred('medium');
        save();
    }

    const btn = document.getElementById('cat-btn');
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); doTap(); });
    btn.addEventListener('click', () => { doTap(); });

    function save() {
        tg.CloudStorage.setItem('rob_data', robiki.toString());
    }

    async function runAd() {
        tg.HapticFeedback.impactOccurred('heavy');
        try {
            const res = await AdController.show();
            if (res.done) {
                robiki += 1000;
                render();
                save();
                tg.showAlert("✅ Успех! +1000 Робиков на счет!");
            }
        } catch (e) {
            console.log(e);
            tg.showAlert("⚠️ Реклама еще проходит модерацию или недоступна. Попробуй позже!");
        }
    }
</script>
</body>
</html>
