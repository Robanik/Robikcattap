<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Robik Cat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk.js"></script>
    <style>
        :root {
            --accent: #39FF14;
            --bg: #000;
            --panel: #111;
        }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 20px env(safe-area-inset-bottom);
            box-sizing: border-box;
        }
        .stats { text-align: center; }
        #balance { font-size: 64px; font-weight: 800; margin: 0; letter-spacing: -2px; }
        .currency { color: var(--accent); font-size: 24px; font-weight: 400; margin-left: 5px; }
        .usd-val { opacity: 0.4; font-size: 16px; margin-top: 5px; }

        .main-tap {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .coin-wrapper {
            width: 80vw;
            height: 80vw;
            max-width: 320px;
            max-height: 320px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 70%);
            border-radius: 50%;
            border: 8px solid var(--panel);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(57, 255, 20, 0.05);
            transition: transform 0.05s ease-out;
            will-change: transform;
        }
        .coin-wrapper:active { transform: scale(0.92); border-color: var(--accent); }
        #cat-img { width: 75%; height: 75%; object-fit: contain; pointer-events: none; }

        .footer { width: 100%; }
        .ad-button {
            background-color: var(--accent);
            color: #000;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(57, 255, 20, 0.2);
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.5;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="stats">
        <p id="balance">0<span class="currency">ROB</span></p>
        <p class="usd-val" id="usd">≈ $0.0000</p>
    </div>

    <div class="main-tap" id="click-area">
        <div class="coin-wrapper">
            <img id="cat-img" src="cat.png" onerror="this.style.opacity='0'">
        </div>
    </div>

    <div class="footer">
        <button class="ad-button" onclick="triggerAd()">ПОЛУЧИТЬ БОНУС</button>
        <div class="info-bar">
            <span>Энергия: 100%</span>
            <span>Boost: x1</span>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let count = 0;
    const blockId = "25055";
    const ads = window.Adsgram.init({ blockId: blockId });

    const balDisplay = document.getElementById('balance');
    const usdDisplay = document.getElementById('usd');

    // Моментальная загрузка
    function load() {
        const saved = localStorage.getItem('rob_val');
        if (saved) {
            count = parseInt(saved);
            updateUI();
        }
        tg.CloudStorage.getItem('rob_val', (err, val) => {
            if (val && parseInt(val) > count) {
                count = parseInt(val);
                updateUI();
            }
        });
    }

    function updateUI() {
        balDisplay.innerHTML = `${count.toLocaleString()}<span class="currency">ROB</span>`;
        usdDisplay.innerText = `≈ $${(count / 100000 * 0.05).toFixed(4)}`;
    }

    // Только для смартфонов (Touch Events)
    const tapArea = document.getElementById('click-area');
    tapArea.addEventListener('touchstart', (e) => {
        e.preventDefault(); // Запрет скролла и зума
        count += 1;
        updateUI();
        
        // Вибрация
        tg.HapticFeedback.impactOccurred('medium');
        
        // Сохранение в локал (мгновенно)
        localStorage.setItem('rob_val', count.toString());
    }, {passive: false});

    // Резервный сейв в облако раз в 7 секунд
    setInterval(() => {
        tg.CloudStorage.setItem('rob_val', count.toString());
    }, 7000);

    async function triggerAd() {
        tg.HapticFeedback.impactOccurred('heavy');
        try {
            const result = await ads.show();
            if (result.done) {
                count += 1000;
                updateUI();
                localStorage.setItem('rob_val', count.toString());
                tg.showAlert("БОНУС +1000 НАЧИСЛЕН");
            }
        } catch (e) {
            tg.showAlert("РЕКЛАМА ЕЩЕ ГРУЗИТСЯ...");
        }
    }

    load();
</script>

</body>
</html>
