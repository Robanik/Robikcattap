<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Robik</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #39FF14; font-family: sans-serif; text-align: center; margin: 0; user-select: none; }
        .wrap { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #balance { font-size: 70px; font-weight: bold; margin: 20px 0; }
        #coin { width: 250px; height: 250px; background: #111; border: 5px solid #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        #coin:active { transform: scale(0.95); border-color: #39FF14; }
        img { width: 80%; pointer-events: none; }
        button { margin-top: 30px; padding: 15px 30px; background: #39FF14; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="balance">0</div>
        <div id="coin" id="tapBtn">
            <img src="cat.png" onerror="this.src='https://em-content.zobj.net/source/apple/354/cat-face_1f331.png'">
        </div>
        <button onclick="showAds()">БОНУС +1000</button>
    </div>

    <script>
        // БЛОК 1: СРАЗУ ОБЪЯВЛЯЕМ ПЕРЕМЕННЫЕ
        let score = 0;
        const balDisplay = document.getElementById('balance');
        const coinBtn = document.getElementById('coin');

        // Попытка загрузить из памяти телефона
        const saved = localStorage.getItem('my_score');
        if (saved) {
            score = parseInt(saved);
            balDisplay.innerText = score;
        }

        // БЛОК 2: ТАП (САМОЕ ГЛАВНОЕ)
        function doTap(e) {
            if(e) e.preventDefault();
            score++;
            balDisplay.innerText = score;
            localStorage.setItem('my_score', score);
            
            // Вибрация, если мы в ТГ
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
        }

        // Вешаем событие и на тач, и на клик для надежности
        coinBtn.addEventListener('touchstart', doTap);
        coinBtn.addEventListener('mousedown', doTap);

        // БЛОК 3: РЕКЛАМА (В ОТДЕЛЬНОМ СКРИПТЕ, ЧТОБЫ НЕ ВЕШАТЬ ТАПЫ)
        function showAds() {
            alert("Функция рекламы вызвана! Если Adsgram загружен, она сработает.");
            // Тут потом добавим код Adsgram, когда клики заработают
        }
    </script>
    <script src="https://adsgram.ai/sdk.js"></script>
</body>
</html>
